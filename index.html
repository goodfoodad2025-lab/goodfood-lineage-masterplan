<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GoodFood × Lineage – Operations Hub</title>
<style>
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0efe9;--bd:#e5e4dd;--bd2:#d0cfc8;
  --tx:#1a1a18;--tx2:#5c5c56;--tx3:#9c9c94;
  --pu:#534AB7;--pub:#EEEDFE;--put:#26215C;
  --bl:#185FA5;--blb:#E6F1FB;--blt:#0C447C;
  --gn:#27500A;--gnb:#EAF3DE;--gnt:#27500A;
  --am:#BA7517;--amb:#FAEEDA;--amt:#633806;
  --rd:#A32D2D;--rdb:#FCEBEB;--rdt:#791F1F;
  --gy:#888780;--gyb:#F1EFE8;--gyt:#444441;
  --teal:#0F6E56;--tealb:#E0F2EE;
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;color:var(--tx);background:var(--bg2)}
/* LAYOUT */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{background:var(--put);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
.topbar h1{font-size:15px;font-weight:700;white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.conn-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0}
.conn-dot.on{background:#4ade80}
.conn-dot.off{background:#f87171}
.nav{background:#fff;border-bottom:1px solid var(--bd);display:flex;overflow-x:auto;flex-shrink:0;padding:0 16px}
.nav-item{padding:10px 14px;cursor:pointer;font-size:12px;font-weight:600;border-bottom:2px solid transparent;color:var(--tx3);white-space:nowrap;display:flex;align-items:center;gap:5px}
.nav-item.on{color:var(--pu);border-bottom-color:var(--pu)}
.nav-item:hover{color:var(--tx)}
.content{flex:1;overflow-y:auto;padding:16px 20px}
/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.card{background:#fff;border:1px solid var(--bd);border-radius:var(--rl);padding:12px 14px;border-left:3px solid var(--pu)}
.card-lbl{font-size:11px;color:var(--tx3);margin-bottom:4px;font-weight:500}
.card-val{font-size:22px;font-weight:700}
.card-sub{font-size:11px;color:var(--tx3);margin-top:2px}
/* SECTION */
.sec{font-size:14px;font-weight:700;margin:16px 0 10px;display:flex;align-items:center;gap:8px}
.sec-badge{font-size:11px;font-weight:600;padding:1px 8px;border-radius:10px;background:var(--pub);color:var(--pu)}
/* TABLE */
.tbl-wrap{overflow-x:auto;border:1px solid var(--bd);border-radius:var(--rl);background:#fff;margin-bottom:16px}
table{border-collapse:collapse;min-width:100%;font-size:12px}
th{background:var(--bg2);padding:7px 9px;text-align:left;border-bottom:1px solid var(--bd);white-space:nowrap;font-weight:700;font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.3px}
td{padding:5px 9px;border-bottom:1px solid var(--bd);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.ph-row td{background:var(--pub);font-weight:700;color:var(--put);padding:6px 10px}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:700;white-space:nowrap;border:1px solid transparent}
.s-done{background:var(--gnb);color:var(--gnt);border-color:#c0dd97}
.s-doing{background:var(--blb);color:var(--blt);border-color:#b5d4f4}
.s-pending{background:var(--amb);color:var(--amt);border-color:#FAC775}
.s-todo{background:var(--gyb);color:var(--gyt);border-color:var(--bd2)}
.s-blocked{background:var(--rdb);color:var(--rdt);border-color:#f7c1c1}
.s-open{background:var(--rdb);color:var(--rdt);border-color:#f7c1c1}
.s-resolved{background:var(--gnb);color:var(--gnt);border-color:#c0dd97}
.s-investigating{background:var(--amb);color:var(--amt);border-color:#FAC775}
/* RACI */
.tr{display:inline-block;background:var(--amb);color:var(--amt);padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700;margin:1px 0}
.ta{display:inline-block;background:var(--rdb);color:var(--rdt);padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700;margin:1px 0}
.tc{display:inline-block;background:var(--gnb);color:var(--gnt);padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700;margin:1px 0}
.ti{display:inline-block;background:var(--blb);color:var(--blt);padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700;margin:1px 0}
.raci-cell{min-width:150px;line-height:1.9}
/* PROGRESS */
.pb{height:6px;background:var(--bd);border-radius:3px;width:60px;overflow:hidden;display:inline-block;vertical-align:middle}
.pbf{height:100%;border-radius:3px;background:var(--pu)}
/* BAR CHART */
.bar-cell{min-width:260px;padding:4px 9px}
.bwrap{position:relative;height:14px}
.bar{position:absolute;height:10px;top:2px;border-radius:2px;min-width:3px}
/* BUTTONS */
.btn{padding:4px 12px;height:28px;font-size:12px;border-radius:var(--r);cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-weight:600;transition:all .15s;white-space:nowrap}
.btn-p{background:var(--pu);color:#fff;border:none}.btn-p:hover{opacity:.9}
.btn-g{background:#fff;color:var(--tx);border:1px solid var(--bd2)}.btn-g:hover{background:var(--bg2)}
.btn-danger{background:#fff;color:var(--rd);border:1px solid var(--rdb)}.btn-danger:hover{background:var(--rdb)}
.btn-sm{height:24px;font-size:11px;padding:2px 8px}
.btn-white{background:#fff;color:var(--put);border:none;font-weight:700}
/* CONTROLS */
.ctrls{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.ctrls select,.ctrls input[type=text]{font-size:12px;padding:4px 8px;height:28px;border-radius:var(--r);border:1px solid var(--bd2);background:#fff;color:var(--tx)}
/* FORM */
.form-panel{background:#fff;border:1px solid var(--bd2);border-left:3px solid var(--pu);border-radius:0 var(--rl) var(--rl) 0;padding:14px 16px;margin-bottom:12px}
.form-panel h4{font-size:13px;font-weight:700;margin-bottom:12px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fg-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fg-full{grid-column:1/-1}
.fl{font-size:11px;color:var(--tx3);margin-bottom:3px;font-weight:600}
.fi{width:100%;padding:6px 9px;border-radius:var(--r);font-size:12px;border:1px solid var(--bd2);background:#fff;color:var(--tx)}
.fi:focus{outline:none;border-color:var(--pu);box-shadow:0 0 0 2px rgba(83,74,183,.1)}
textarea.fi{min-height:60px;resize:vertical}
.fsec{font-size:11px;font-weight:700;color:var(--tx3);margin:12px 0 6px;letter-spacing:.4px;text-transform:uppercase}
.fact{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
/* ALERTS */
.alert{border-radius:var(--r);padding:10px 14px;margin-bottom:10px;font-size:12px;font-weight:500;display:flex;gap:8px;align-items:flex-start}
.alert-warn{background:var(--amb);border:1px solid #FAC775;color:var(--amt)}
.alert-err{background:var(--rdb);border:1px solid #f7c1c1;color:var(--rdt)}
.alert-ok{background:var(--gnb);border:1px solid #c0dd97;color:var(--gnt)}
.alert-info{background:var(--blb);border:1px solid #b5d4f4;color:var(--blt)}
/* KPI progress ring */
.kpi-card{background:#fff;border:1px solid var(--bd);border-radius:var(--rl);padding:14px;text-align:center}
.kpi-pct{font-size:26px;font-weight:700}
.kpi-lbl{font-size:11px;color:var(--tx3);margin-top:4px}
.kpi-target{font-size:11px;color:var(--tx3)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
/* LEGEND */
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;font-size:11px;color:var(--tx3);align-items:center}
.ldot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:2px;vertical-align:middle}
/* NAME */
.name-en{font-weight:500}
.name-vi{font-size:11px;color:var(--tx3);margin-top:1px}
/* LOADING */
.loading{text-align:center;padding:40px;color:var(--tx3)}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--bd);border-top-color:var(--pu);border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
/* COST */
.cost-pos{color:var(--gnt);font-weight:700}
.cost-neg{color:var(--rdt);font-weight:700}
/* PERM TOGGLE */
.tgl{position:relative;display:inline-block;width:36px;height:20px}
.tgl input{opacity:0;width:0;height:0}
.sld{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--bd2);border-radius:10px;transition:.3s}
.sld:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.sld{background:var(--pu)}
input:checked+.sld:before{transform:translateX(16px)}
.perm-row{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border:1px solid var(--bd);border-radius:var(--r);margin-bottom:6px;background:#fff}
/* CFG PANEL */
.cfg-panel{background:var(--amb);border:1px solid #FAC775;border-radius:var(--r);padding:12px 16px;margin-bottom:12px;display:none}
.cfg-panel input{width:100%;margin-top:6px;padding:6px 9px;border-radius:var(--r);font-size:12px;font-family:monospace;border:1px solid #FAC775;background:#fff}
/* RESPONSIVE */
@media(max-width:700px){.fg,.fg-3{grid-template-columns:1fr}.fg-full{grid-column:1}.cards{grid-template-columns:1fr 1fr}.kpi-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">

<!-- TOP BAR -->
<div class="topbar">
  <h1>📦 GoodFood × Lineage – Operations Hub</h1>
  <div class="topbar-right">
    <span class="conn-dot" id="conn-dot"></span>
    <span id="conn-lbl" style="font-size:11px;opacity:.8">Chưa kết nối</span>
    <button class="btn btn-white btn-sm" onclick="toggleCfg()">⚙️ API</button>
  </div>
</div>

<!-- CFG PANEL -->
<div id="cfg-panel" class="cfg-panel" style="margin:0;border-radius:0;padding:10px 20px">
  <strong style="font-size:12px">⚙️ Google Sheets API URL</strong>
  <input type="text" id="api-input" placeholder="https://script.google.com/macros/s/AKfyc.../exec"/>
  <div style="display:flex;gap:6px;margin-top:8px">
    <button class="btn btn-p btn-sm" onclick="saveApi()">💾 Lưu & kết nối</button>
    <button class="btn btn-g btn-sm" onclick="toggleCfg()">Đóng</button>
    <button class="btn btn-danger btn-sm" onclick="clearApi()">Xoá</button>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <div class="nav-item on" onclick="nav('dashboard',this)">🏠 Dashboard</div>
  <div class="nav-item" onclick="nav('daily',this)">📋 Daily Ops</div>
  <div class="nav-item" onclick="nav('incidents',this)">🚨 Sự cố / Đơn rớt</div>
  <div class="nav-item" onclick="nav('kpi',this)">📊 KPI</div>
  <div class="nav-item" onclick="nav('costs',this)">💰 Chi phí</div>
  <div class="nav-item" onclick="nav('gantt',this)">📅 Master Plan</div>
  <div class="nav-item" onclick="nav('raci',this)">🔀 RACI</div>
  <div class="nav-item" onclick="nav('settings',this)">⚙️ Cài đặt</div>
</div>

<!-- CONTENT -->
<div class="content" id="content">
  <div class="loading"><span class="spinner"></span>Đang tải...</div>
</div>

</div><!-- .app -->

<script>
// ===== CONFIG =====
const S0=new Date('2026-06-08'),TDAYS=90;
const PC={A:'#534AB7',B:'#185FA5',C:'#0F6E56',D:'#BA7517',E:'#993C1D',F:'#A32D2D'};
const PN={A:'Overview – Tổng quan',B:'Trial – Thử nghiệm',C:'Handover FS1',D:'Handover FS2',E:'Handover FS3',F:'Summary – Tổng kết'};
const SC={done:'#27500A',doing:'#185FA5',pending:'#BA7517',todo:'#888780',blocked:'#A32D2D'};
const SL={done:'✅ Done',doing:'🔵 Đang thực hiện',pending:'⏳ Pending',todo:'⬜ Chưa bắt đầu',blocked:'🔴 Blocked'};
const SS={done:'s-done',doing:'s-doing',pending:'s-pending',todo:'s-todo',blocked:'s-blocked'};
const ITypes={'late_delivery':'Giao trễ','wrong_item':'Sai hàng','damage':'Hàng hỏng','temp_issue':'Lỗi nhiệt độ','shortage':'Thiếu hàng','doc_error':'Sai chứng từ','other':'Khác'};
const IStatus={'open':'🔴 Mở','investigating':'🟡 Đang xử lý','resolved':'✅ Đã xử lý'};

let API='https://script.google.com/macros/s/AKfycbwGdby8xhdGlndUApgPcl4jtekDHyVRW1zmlke3hfwKCHEEwlrNHsls8N6-O9gI5mFA/exec',data={tasks:[],incidents:[],daily:[],kpi:[],costs:[],changes:[]};
let openEdit=null,curPage='dashboard';

// ===== API =====
function loadApi(){API=localStorage.getItem('gf-api-v2')||'';updateConn();}
function saveApi(){API=document.getElementById('api-input').value.trim();localStorage.setItem('gf-api-v2',API);toggleCfg();loadAll();}
function clearApi(){API='';localStorage.removeItem('gf-api-v2');updateConn();}
function toggleCfg(){const p=document.getElementById('cfg-panel');p.style.display=p.style.display==='block'?'none':'block';if(p.style.display==='block')document.getElementById('api-input').value=API;}
function updateConn(ok){
  const d=document.getElementById('conn-dot'),l=document.getElementById('conn-lbl');
  if(ok===true){d.className='conn-dot on';l.textContent='🟢 Google Sheets';}
  else if(ok===false){d.className='conn-dot off';l.textContent='🔴 Lỗi kết nối';}
  else{d.className='conn-dot';l.textContent=API?'Đang kết nối...':'Chưa cấu hình API';}
}

async function apiFetch(action){
  if(!API)throw new Error('no-api');
  const r=await fetch(API+'?action='+action);
  return r.json();
}
async function apiPost(body){
  if(!API)throw new Error('no-api');
  const r=await fetch(API,{method:'POST',body:JSON.stringify(body)});
  return r.json();
}

function fromLS(key,def){try{const d=localStorage.getItem(key);return d?JSON.parse(d):def;}catch(e){return def;}}
function toLS(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}

async function loadAll(){
  updateConn();
  // load from localStorage first for instant render
  data.tasks=fromLS('gf2-tasks',[]);
  data.incidents=fromLS('gf2-incidents',[]);
  data.daily=fromLS('gf2-daily',[]);
  data.kpi=fromLS('gf2-kpi',[]);
  data.costs=fromLS('gf2-costs',[]);
  data.changes=fromLS('gf2-changes',[]);
  if(!data.tasks.length)data.tasks=defaultTasks();
  renderCurrent();

  if(!API)return;
  try{
    const [t,i,d2,k,c,ch]=await Promise.all([
      apiFetch('getTasks'),apiFetch('getIncidents'),
      apiFetch('getDailyOps'),apiFetch('getKPI'),
      apiFetch('getCosts'),apiFetch('getChanges')
    ]);
    if(Array.isArray(t)&&t.length){data.tasks=t.map(normalizeTask);toLS('gf2-tasks',data.tasks);}
    if(Array.isArray(i)){data.incidents=i;toLS('gf2-incidents',i);}
    if(Array.isArray(d2)){data.daily=d2;toLS('gf2-daily',d2);}
    if(Array.isArray(k)){data.kpi=k;toLS('gf2-kpi',k);}
    if(Array.isArray(c)){data.costs=c;toLS('gf2-costs',c);}
    if(Array.isArray(ch)){data.changes=ch;toLS('gf2-changes',ch);}
    updateConn(true);
  }catch(e){updateConn(false);}
  renderCurrent();
}

async function saveRow(sheet,row){
  toLS('gf2-'+sheet.toLowerCase(),data[sheet.toLowerCase()]);
  if(API)try{await apiPost({action:'saveRow',sheet,row});}catch(e){}
}
async function deleteRow(sheet,id){
  toLS('gf2-'+sheet.toLowerCase(),data[sheet.toLowerCase()]);
  if(API)try{await apiPost({action:'deleteRow',sheet,id});}catch(e){}
}

function normalizeTask(t){return{id:t.id,ph:t.ph,tt:t.tt,name:t.name||'',name_vi:t.name_vi||'',gf:+t.gf||0,ln:+t.ln||0,st:t.st||'todo',pct:+t.pct||0,s:t.s||'2026-06-08',e:t.e||'2026-06-08',os:t.os||t.s||'2026-06-08',oe:t.oe||t.e||'2026-06-08',r:t.r||'',a:t.a||'',c:t.c||'',i:t.i||'BLD GF'};}
function nextId(arr){return(Math.max(0,...arr.map(x=>+x.id||0))+1);}
function today(){return new Date().toISOString().slice(0,10);}
function todayVi(){return new Date().toLocaleDateString('vi-VN');}
function doff(ds){return Math.round((new Date(ds)-S0)/86400000);}
function fmt(ds){if(!ds)return'';const d=new Date(ds);return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0');}
function fmtFull(ds){if(!ds)return'';const d=new Date(ds);return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ===== NAV =====
function nav(page,el){
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');curPage=page;openEdit=null;renderCurrent();
}
function renderCurrent(){
  const fn={dashboard:renderDashboard,daily:renderDaily,incidents:renderIncidents,kpi:renderKPI,costs:renderCosts,gantt:renderGantt,raci:renderRaci,settings:renderSettings};
  if(fn[curPage])fn[curPage]();
}

// ===== DASHBOARD =====
function renderDashboard(){
  const tasks=data.tasks,inc=data.incidents,ops=data.daily;
  const done=tasks.filter(t=>t.st==='done').length;
  const prog=tasks.length?Math.round(tasks.reduce((s,t)=>s+(+t.pct||0),0)/tasks.length):0;
  const openInc=inc.filter(i=>i.status==='open'||i.status==='investigating').length;
  const todayOps=ops.filter(o=>o.date===today());
  const thisWeekInc=inc.filter(i=>{const d=new Date(i.date);const now=new Date();return(now-d)/86400000<=7;});
  const totalCostDiff=data.costs.reduce((s,c)=>s+(+c.diff||0),0);

  // KPI summary from latest week
  const latestKPI=data.kpi.sort((a,b)=>String(b.week).localeCompare(String(a.week)))[0];

  let html=`
  <div id="dash-alert"></div>
  <div class="cards">
    <div class="card" style="border-left-color:#534AB7">
      <div class="card-lbl">📅 Tiến độ dự án</div>
      <div class="card-val" style="color:#534AB7">${prog}%</div>
      <div class="card-sub">${done}/${tasks.length} tasks hoàn thành</div>
    </div>
    <div class="card" style="border-left-color:${openInc>0?'#A32D2D':'#27500A'}">
      <div class="card-lbl">🚨 Sự cố đang mở</div>
      <div class="card-val" style="color:${openInc>0?'#A32D2D':'#27500A'}">${openInc}</div>
      <div class="card-sub">${thisWeekInc.length} sự cố tuần này</div>
    </div>
    <div class="card" style="border-left-color:#185FA5">
      <div class="card-lbl">📊 OTIF tuần này</div>
      <div class="card-val" style="color:#185FA5">${latestKPI?Math.round(+latestKPI.otif_actual||0)+'%':'—'}</div>
      <div class="card-sub">Target: ${latestKPI?latestKPI.otif_target||'95':'95'}%</div>
    </div>
    <div class="card" style="border-left-color:${totalCostDiff<0?'#A32D2D':'#27500A'}">
      <div class="card-lbl">💰 Chi phí phát sinh</div>
      <div class="card-val" style="color:${totalCostDiff<0?'#A32D2D':'#0F6E56'}">${totalCostDiff<0?'▲':''}${Math.abs(Math.round(totalCostDiff/1000))}K</div>
      <div class="card-sub">So với hợp đồng</div>
    </div>
  </div>

  <div class="sec">🚨 Sự cố đang mở <span class="sec-badge">${openInc}</span></div>`;

  const openList=inc.filter(i=>i.status==='open'||i.status==='investigating').slice(0,5);
  if(!openList.length){html+=`<div class="alert alert-ok">✅ Không có sự cố nào đang mở</div>`;}
  else{
    html+=`<div class="tbl-wrap"><table><thead><tr><th>Ngày</th><th>Loại</th><th>Kênh</th><th>Mô tả</th><th>Trạng thái</th><th>Ảnh hưởng chi phí</th></tr></thead><tbody>`;
    openList.forEach(i=>{
      html+=`<tr><td>${fmtFull(i.date)}</td><td>${ITypes[i.type]||i.type}</td><td>${esc(i.channel)}</td><td style="max-width:200px;white-space:normal">${esc(i.desc)}</td><td><span class="badge s-${i.status||'open'}">${IStatus[i.status]||i.status}</span></td><td>${i.cost_impact?`<span class="cost-neg">-${Number(i.cost_impact).toLocaleString()}đ</span>`:'-'}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }

  html+=`<div class="sec">📋 Daily Ops hôm nay</div>`;
  if(!todayOps.length){
    html+=`<div class="alert alert-warn">⚠️ Chưa có báo cáo Daily Ops hôm nay (${fmtFull(today())})</div>
    <button class="btn btn-p" onclick="nav('daily',document.querySelectorAll('.nav-item')[1])">+ Nhập báo cáo hôm nay</button>`;
  } else {
    const o=todayOps[0];
    html+=`<div class="cards">
      <div class="card" style="border-left-color:#0F6E56"><div class="card-lbl">Nhập hàng (cont)</div><div class="card-val">${o.inbound_actual||0}<span style="font-size:13px;color:var(--tx3)">/${o.inbound_cont||0}</span></div></div>
      <div class="card" style="border-left-color:#185FA5"><div class="card-lbl">Xuất hàng (tấn)</div><div class="card-val">${o.outbound_actual||0}<span style="font-size:13px;color:var(--tx3)">/${o.outbound_ton||0}</span></div></div>
      <div class="card" style="border-left-color:#A32D2D"><div class="card-lbl">Giao trễ (đơn)</div><div class="card-val" style="color:${(o.late_delivery||0)>0?'#A32D2D':'#27500A'}">${o.late_delivery||0}</div></div>
      <div class="card" style="border-left-color:#BA7517"><div class="card-lbl">Hàng hỏng (kiện)</div><div class="card-val" style="color:${(o.damage_qty||0)>0?'#BA7517':'#27500A'}">${o.damage_qty||0}</div></div>
    </div>`;
  }

  html+=`<div class="sec">📅 Tasks sắp đến hạn (7 ngày tới)</div>`;
  const upcoming=tasks.filter(t=>{if(t.st==='done')return false;
    const d=doff(t.e);return d>=0&&d<=7;
  }).slice(0,6);
  if(!upcoming.length){html+=`<p style="color:var(--tx3);font-size:13px">Không có task nào đến hạn trong 7 ngày tới</p>`;}
  else{
    html+=`<div class="tbl-wrap"><table><thead><tr><th>Phase</th><th>Công việc</th><th>Deadline</th><th>Trạng thái</th><th>R</th></tr></thead><tbody>`;
    upcoming.forEach(t=>{
      html+=`<tr><td><span style="background:${PC[t.ph]};color:#fff;padding:1px 8px;border-radius:8px;font-size:11px;font-weight:700">${t.ph}</span></td>
        <td style="white-space:normal;max-width:220px"><div class="name-en">${esc(t.name)}</div><div class="name-vi">${esc(t.name_vi)}</div></td>
        <td style="white-space:nowrap;font-weight:600;color:${doff(t.e)<=2?'#A32D2D':'#BA7517'}">${fmt(t.e)}</td>
        <td><span class="badge ${SS[t.st]}">${SL[t.st]}</span></td>
        <td style="font-size:11px">${esc(t.r)}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }

  document.getElementById('content').innerHTML=html;

  // Alert if incidents open
  if(openInc>0){
    document.getElementById('dash-alert').innerHTML=`<div class="alert alert-err">🚨 Có <strong>${openInc} sự cố chưa xử lý</strong> — cần kiểm tra ngay!</div>`;
  }
}

            <option value="resolved"${e&&e.status==='resolved'?' selected':''}>✅ Đã xử lý</option>
          </select>
        </div>
        <div><div class="fl">Ngày xử lý xong</div><input class="fi" type="date" id="i-resolved" value="${e?e.resolved_date:''}"/></div>
        <div><div class="fl">Nguyên nhân gốc rễ (Root Cause)</div><input class="fi" id="i-cause" placeholder="VD: Booking trễ, xe thiếu, hàng lỗi..." value="${esc(e?e.root_cause:'')}"/></div>
        <div><div class="fl">Ảnh hưởng chi phí (VNĐ)</div><input class="fi" type="number" id="i-cost" placeholder="0" value="${e?e.cost_impact:0}"/></div>
      </div>
      <div class="fact">
        <button class="btn btn-p" onclick="saveInc()">💾 Lưu</button>

        ${e?`<button class="btn btn-danger" onclick="delInc('${e.id}')">🗑 Xoá</button>`:''}
      </div>
    </div>`;
  }

  const sf=document.getElementById('inc-filter')?.value||'all';
  const tf=document.getElementById('inc-type-filter')?.value||'all';

  const open=data.incidents.filter(i=>i.status==='open').length;
  const inv=data.incidents.filter(i=>i.status==='investigating').length;

  html+=`<div class="cards">
    <div class="card" style="border-left-color:#A32D2D"><div class="card-lbl">🔴 Đang mở</div><div class="card-val" style="color:#A32D2D">${open}</div></div>

    html+=`<tr>
      <td style="white-space:nowrap;font-weight:600">${fmtFull(i.date)}</td>
      <td><span class="badge s-${i.status==='open'?'blocked':i.status==='resolved'?'done':'pending'}">${ITypes[i.type]||i.type}</span></td>

      <td style="max-width:200px;white-space:normal;font-size:11px">${esc(i.desc)}</td>
      <td style="font-size:11px;color:var(--tx3)">${esc(i.reported_by)}</td>

      <td style="max-width:150px;white-space:normal;font-size:11px;color:var(--tx2)">${esc(i.root_cause)}</td>
      <td style="white-space:nowrap">${i.cost_impact&&+i.cost_impact>0?`<span class="cost-neg">-${Number(i.cost_impact).toLocaleString()}</span>`:'-'}</td>
      <td><button class="btn btn-g btn-sm" onclick='editInc(${JSON.stringify(i).replace(/'/g,"&#39;")})'>✏️</button></td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  document.getElementById('content').innerHTML=html;
}

        <div class="kpi-target">Target: ≤1%</div>
      </div>
      <div class="kpi-card" style="border-top:3px solid ${(+latest.incident_count||0)===0?'#27500A':'#BA7517'}">
        <div class="kpi-pct" style="color:${(+latest.incident_count||0)===0?'#27500A':'#BA7517'}">${latest.incident_count||0}</div>
        <div class="kpi-lbl">Sự cố trong tuần</div>
        <div class="kpi-target">Target: 0</div>
      </div>

    <tbody>`;

    const ok=+k.otif_actual>=(+k.otif_target||95);

      <td style="font-weight:700">${k.week}</td>

      <td><span class="badge ${ok?'s-done':'s-blocked'}">${k.otif_actual||0}%</span></td>

      <td>${(+k.late_booking_gf||0)>0?`<span class="badge s-pending">${k.late_booking_gf} lần</span>`:`<span style="color:var(--gnt)">0 ✓</span>`}</td>

}
function getWeek(){const d=new Date();const j=new Date(Date.UTC(d.getFullYear(),0,1));const w=Math.ceil(((d-j)/86400000+j.getDay()+1)/7);return d.getFullYear()+'-W'+String(w).padStart(2,'0');}
function openKPIForm(d){openEdit=d==='new'?'new-kpi':d;renderKPI();}
function editKPI(o){o._kpi=true;openEdit=o;renderKPI();}
async function saveKPI(){
  const row={_kpi:true,id:typeof openEdit==='object'&&openEdit.id?openEdit.id:nextId(data.kpi),week:document.getElementById('k-week').value,otif_target:document.getElementById('k-ot').value,otif_actual:document.getElementById('k-oa').value,report_ontime:document.getElementById('k-rpt').value,incident_count:document.getElementById('k-inc').value,damage_rate:document.getElementById('k-dmg').value,late_booking_gf:document.getElementById('k-lb').value,note:document.getElementById('k-note').value};
  const idx=data.kpi.findIndex(x=>String(x.id)===String(row.id));
  if(idx>=0)data.kpi[idx]=row;else data.kpi.push(row);
  await saveRow('KPI',row);openEdit=null;renderKPI();
}
async function delKPI(id){if(!confirm('Xoá?'))return;data.kpi=data.kpi.filter(x=>String(x.id)!==String(id));await deleteRow('KPI',id);openEdit=null;renderKPI();}

    if(t.ph!==lastPh){lastPh=t.ph;rows+=`<tr class="ph-row"><td colspan="11"><span style="background:${PC[t.ph]};color:#fff;padding:1px 9px;border-radius:9px;font-size:11px;font-weight:700;margin-right:6px">${t.ph}</span>${PN[t.ph]}</td></tr>`;}
    const so=doff(t.s),eo=doff(t.e),dur=Math.max(1,eo-so+1);
    const lft=Math.max(0,(so/TDAYS)*100).toFixed(1);
    const wid=Math.min(100-parseFloat(lft),(dur/TDAYS)*100).toFixed(1);
    let orig='';
    if(t.os!==t.s||t.oe!==t.e){const ol=Math.max(0,(doff(t.os)/TDAYS)*100).toFixed(1);const ow=Math.min(100-parseFloat(ol),(Math.max(1,doff(t.oe)-doff(t.os)+1)/TDAYS)*100).toFixed(1);orig=`<div class="bar" style="left:${ol}%;width:${ow}%;background:#534AB7;opacity:.2"></div>`;}
    const isO=openEdit===String(t.id);
    rows+=`<tr>
      <td style="color:var(--tx3);font-size:11px">${t.tt}</td>
      <td style="white-space:normal;min-width:180px;max-width:240px"><div class="name-en">${esc(t.name)}</div><div class="name-vi">${esc(t.name_vi)}</div></td>
      <td style="text-align:center">${t.gf?'<span style="color:#27500A;font-weight:700">✓</span>':''}</td>

      </div>

      </div>

function toggleTask(id){openEdit=openEdit===String(id)?null:String(id);renderGantt();}
async function saveTask(id){
  const t=data.tasks.find(x=>String(x.id)===String(id));
  const ns=document.getElementById('t-s-'+id).value,ne=document.getElementById('t-e-'+id).value;
  const nst=document.getElementById('t-st-'+id).value,np=+document.getElementById('t-p-'+id).value||0;
  if(t.s!==ns||t.e!==ne){
    const shift=doff(ns)-doff(t.s);
    data.changes.push({date:todayVi(),task:t.name,field:'Timeline',old:fmt(t.s)+'→'+fmt(t.e),new:fmt(ns)+'→'+fmt(ne),note:document.getElementById('t-note-'+id).value,editor:''});
    toLS('gf2-changes',data.changes);
    if(shift>0){const ps=['A','B','C','D','E','F'],pi=ps.indexOf(t.ph);data.tasks.forEach(x=>{if(String(x.id)===String(id))return;if(ps.indexOf(x.ph)>pi){const sd=new Date(x.s);sd.setDate(sd.getDate()+shift);const ed=new Date(x.e);ed.setDate(ed.getDate()+shift);x.s=sd.toISOString().slice(0,10);x.e=ed.toISOString().slice(0,10);}});}
  }
  t.name=document.getElementById('t-name-'+id).value;t.name_vi=document.getElementById('t-nvi-'+id).value;
  t.s=ns;t.e=ne;t.st=nst;t.pct=Math.min(100,Math.max(0,np));
  t.r=document.getElementById('t-r-'+id).value;t.a=document.getElementById('t-a-'+id).value;
  t.c=document.getElementById('t-c-'+id).value;t.i=document.getElementById('t-i-'+id).value;
  await saveRow('Tasks',t);openEdit=null;renderGantt();
}
async function delTask(id){if(!confirm('Xoá task?'))return;data.tasks=data.tasks.filter(x=>String(x.id)!==String(id));await deleteRow('Tasks',id);openEdit=null;renderGantt();}
